name: Dependabot Auto Merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Check required status checks
        uses: actions/github-script@v7
        with:
          script: |
            const pullNumber = context.payload.pull_request.number;
            
            // Wait for all status checks to complete
            await new Promise(resolve => setTimeout(resolve, 5000));
            
            const { data: checks } = await github.rest.checks.listForRef({
              ...context.repo,
              ref: context.payload.pull_request.head.sha,
              status: 'completed'
            });
            
            // Check if all checks passed
            const allChecksPassed = checks.check_runs.every(check => check.conclusion === 'success');
            console.log('Checks status:', checks.check_runs.map(c => `${c.name}: ${c.conclusion}`));
            console.log('All checks passed:', allChecksPassed);
            
            if (!allChecksPassed) {
              // Get the conclusion of the checks
              const failedChecks = checks.check_runs.filter(check => check.conclusion !== 'success');
              if (failedChecks.length > 0) {
                core.setFailed(`Some checks failed: ${failedChecks.map(c => c.name).join(', ')}`);
              }
            }

      - name: Wait for CI to complete
        run: |
          echo "Waiting for CI checks to complete..."
          for i in {1..60}; do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/status --jq '.state')
            echo "Status check attempt $i: $STATUS"
            if [ "$STATUS" = "success" ]; then
              echo "All status checks passed!"
              exit 0
            elif [ "$STATUS" = "failure" ]; then
              echo "Status checks failed."
              exit 1
            fi
            sleep 30
          done
          echo "Timeout waiting for status checks"
          exit 1

      - name: Enable auto-merge
        run: |
          gh pr merge --admin --merge ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
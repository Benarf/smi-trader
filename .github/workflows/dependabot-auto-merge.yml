name: Dependabot Auto Merge

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Wait for all checks to complete
        uses: actions/github-script@v7
        id: wait-for-checks
        with:
          script: |
            const maxWaitMinutes = 30;
            const checkIntervalSeconds = 30;
            const maxAttempts = Math.floor(maxWaitMinutes * 60 / checkIntervalSeconds);
            
            async function waitForChecks() {
              const prNumber = context.payload.pull_request.number;
              const ref = context.payload.pull_request.head.sha;
              
              for (let i = 0; i < maxAttempts; i++) {
                // Check commit status (GitHub Actions, status checks)
                const statusResponse = await github.rest.repos.getCombinedStatusForRef(
                  context.repo.owner,
                  context.repo.repo,
                  ref
                );
                
                const state = statusResponse.data.state;
                console.log(`Attempt ${i + 1}/${maxAttempts}: Status state = ${state}`);
                
                if (state === 'success') {
                  console.log('All checks passed successfully!');
                  return true;
                } else if (state === 'failure') {
                  console.log('Checks failed. Cannot auto-merge.');
                  return false;
                }
                
                // Wait before checking again
                await new Promise(resolve => setTimeout(resolve, checkIntervalSeconds * 1000));
              }
              
              console.log('Timeout: Checks did not complete within ' + maxWaitMinutes + ' minutes');
              return false;
            }
            
            const success = await waitForChecks();
            if (!success) {
              core.setFailed('Checks did not pass or timeout reached');
            }

      - name: Auto-merge PR
        if: steps.wait-for-checks.conclusion == 'success'
        run: |
          gh pr merge --admin --merge ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}